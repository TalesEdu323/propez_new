name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (informative)
        run: npm run typecheck
        continue-on-error: true

      # Smoke HTTP opcional: só falha o job se INTEGRATION_CHECK=true e o servidor estiver acessível.
      - name: Check integrations (optional)
        run: npm run check:integrations
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
